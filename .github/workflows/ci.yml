name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  license-check:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: |
          missing=$(git ls-files "*.py" | xargs grep -L "SPDX-License-Identifier" 2>/dev/null || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX-License-Identifier header in:"
            echo "$missing"
            exit 1
          fi

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: Run ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create virtualenv and install dependencies
        # tests/conftest.py guards against running outside a virtualenv
        # (asserts sys.prefix contains pyvenv.cfg), so create one explicitly.
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        # Activate the venv so `python3` (used by the bash shims under test)
        # resolves to the venv interpreter that has the deps installed.
        run: |
          source .venv/bin/activate
          pytest -q
